kind = "web"
previewPath = "/"
title = "Nabila FKIR – Link Hub"
version = "1.0.0"
id = "artifacts/link-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19116

[services.development]
run = "pnpm --filter @workspace/link-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/link-hub", "run", "build" ]
publicDir = "artifacts/link-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19116"
BASE_PATH = "/"
